<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NexCall Pro | Premium Edition</title>
    <link rel="manifest" href="manifest.json">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --wa-teal: #00a884; --wa-dark: #0b141a; --wa-bg: #111b21; }
        body { background-color: var(--wa-dark); color: white; font-family: 'Segoe UI', Roboto, Helvetica, sans-serif; height: 100dvh; overflow: hidden; display: flex; flex-direction: column; }
        
        /* Video & Layout Management */
        .app-content { flex: 1; position: relative; overflow: hidden; }
        .video-wrapper { height: 100%; width: 100%; position: relative; background: #000; display: flex; align-items: center; justify-content: center; }
        .remote-video { width: 100%; height: 100%; object-fit: cover; }
        .self-view { 
            position: absolute; top: 1.5rem; right: 1rem; width: 110px; height: 160px; 
            border-radius: 12px; border: 1.5px solid rgba(255,255,255,0.15); z-index: 50; 
            overflow: hidden; box-shadow: 0 10px 25px rgba(0,0,0,0.5); 
        }

        /* Fixed Navigation Style */
        .nav-bar { height: 75px; background: var(--wa-bg); display: flex; justify-content: space-around; align-items: center; border-top: 1px solid rgba(255,255,255,0.05); }
        .nav-item { display: flex; flex-direction: column; align-items: center; color: #8696a0; width: 25%; }
        .nav-active { color: white; }
        .nav-active .icon-bg { background: #005c4b; color: #dcf8c6; border-radius: 20px; padding: 4px 18px; }
        .nav-text { font-size: 12px; margin-top: 5px; font-weight: 600; }

        /* Icon Centering Fix */
        .btn-action { 
            width: 55px; height: 55px; border-radius: 50%; display: flex; 
            align-items: center; justify-content: center; font-size: 1.3rem; transition: 0.3s; 
        }
        .btn-call-start { background: var(--wa-teal); width: 60px; height: 60px; }

        /* Overlays */
        #incomingCallUI { position: fixed; inset: 0; background: #0b141a; z-index: 1000; display: none; flex-direction: column; align-items: center; padding-top: 15%; }
        .caller-img { width: 120px; height: 120px; background: #202c33; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 4rem; color: #8696a0; margin-bottom: 2rem; border: 2px solid var(--wa-teal); }
        
        /* Audio Mode UI */
        .audio-only-bg { position: absolute; inset: 0; background: radial-gradient(circle, #202c33 0%, #0b141a 100%); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 45; }
        
        .mirror { transform: scaleX(-1); }
        .pulse-ring { animation: pulse 2s infinite; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(0, 168, 132, 0.4); } 70% { box-shadow: 0 0 0 20px rgba(0, 168, 132, 0); } 100% { box-shadow: 0 0 0 0 rgba(0, 168, 132, 0); } }
    </style>
</head>
<body>

    <main class="app-content">
        <div class="video-wrapper">
            <video id="remoteVideo" class="remote-video" autoplay playsinline></video>
            
            <div id="audioModeUI" class="audio-only-bg">
                <div class="caller-img pulse-ring"><i class="fas fa-user"></i></div>
                <h3 id="connectedName" class="text-xl font-semibold">Secure Audio Call</h3>
                <p class="text-teal-500 text-sm mt-2">End-to-End Encrypted</p>
            </div>

            <div class="self-view" id="selfBox">
                <video id="localVideo" class="w-full h-full object-cover mirror" autoplay muted playsinline></video>
            </div>

            <div id="startUI" class="absolute inset-0 bg-[#0b141a] z-[60] flex flex-col items-center justify-center p-8 text-center">
                <div class="mb-8">
                    <div class="w-20 h-20 bg-teal-600/20 rounded-3xl flex items-center justify-center mx-auto mb-4">
                        <i class="fas fa-shield-halved text-4xl text-teal-500"></i>
                    </div>
                    <h1 class="text-2xl font-bold tracking-tight">NexCall <span class="text-teal-500">Pro</span></h1>
                    <p class="text-slate-500 text-sm mt-1">High-Security Communication</p>
                </div>

                <input type="number" id="peer-id" placeholder="Enter Partner's 6 Digits" 
                       class="w-full max-w-xs bg-[#2a3942] rounded-2xl p-4 mb-4 outline-none border-2 border-transparent focus:border-teal-500 text-center text-lg font-bold tracking-widest">
                
                <div class="flex gap-4">
                    <button onclick="makeCall('video')" class="btn-call-start rounded-2xl flex items-center justify-center text-white shadow-lg">
                        <i class="fas fa-video"></i>
                    </button>
                    <button onclick="makeCall('audio')" class="bg-white text-black w-[120px] rounded-2xl font-bold flex items-center justify-center gap-2">
                        <i class="fas fa-phone"></i> Audio
                    </button>
                </div>

                <div class="mt-12 p-4 bg-white/5 rounded-2xl border border-white/10 w-full max-w-xs">
                    <p class="text-[10px] text-slate-400 uppercase font-bold tracking-tighter">My Secure ID</p>
                    <div class="flex items-center justify-center gap-3 mt-1">
                        <span id="my-id" class="text-teal-400 font-mono font-bold uppercase tracking-wider">NIC-XXXXXX</span>
                        <i class="far fa-copy text-teal-500 cursor-pointer" onclick="copyID()"></i>
                    </div>
                </div>
            </div>

            <div id="activeControls" class="hidden absolute bottom-10 inset-x-0 flex justify-center items-center gap-6 z-[70]">
                <button onclick="toggleAudio()" id="audioBtn" class="btn-action bg-white/10 backdrop-blur-md"><i class="fas fa-microphone"></i></button>
                <button onclick="endCall()" class="w-[70px] h-[70px] rounded-full bg-red-600 flex items-center justify-center text-2xl shadow-2xl"><i class="fas fa-phone-slash"></i></button>
                <button onclick="toggleVideo()" id="videoBtn" class="btn-action bg-white/10 backdrop-blur-md"><i class="fas fa-video"></i></button>
            </div>
        </div>
    </main>

    <nav class="nav-bar">
        <div class="nav-item" onclick="switchTab('Chats')"><i class="fas fa-comment-alt"></i><span class="nav-text">Chats</span></div>
        <div class="nav-item" onclick="switchTab('Updates')"><i class="fas fa-circle-notch"></i><span class="nav-text">Updates</span></div>
        <div class="nav-item nav-active">
            <div class="icon-bg"><i class="fas fa-phone"></i></div>
            <span class="nav-text">Calls</span>
        </div>
    </nav>

    <div id="incomingCallUI">
        <div class="caller-img pulse-ring"><i class="fas fa-user"></i></div>
        <h2 class="text-2xl font-bold mb-1">Secure Line</h2>
        <p id="incomingType" class="text-teal-500 font-medium tracking-wide uppercase text-xs mb-20">Incoming Video Call...</p>
        
        <div class="flex gap-16">
            <div class="flex flex-col items-center gap-3">
                <button onclick="declineCall()" class="w-16 h-16 bg-red-500 rounded-full flex items-center justify-center text-xl shadow-lg shadow-red-500/30"><i class="fas fa-times"></i></button>
                <span class="text-xs text-slate-400 font-bold uppercase">Decline</span>
            </div>
            <div class="flex flex-col items-center gap-3">
                <button onclick="acceptCall()" class="w-16 h-16 bg-green-500 rounded-full flex items-center justify-center text-xl shadow-lg shadow-green-500/30 animate-bounce"><i class="fas fa-phone"></i></button>
                <span class="text-xs text-slate-400 font-bold uppercase">Accept</span>
            </div>
        </div>
        <audio id="ringtone" loop src="https://www.soundjay.com/phone/phone-calling-1.mp3"></audio>
    </div>

    <script>
        let nicDigits = localStorage.getItem('user_nic') || prompt("Enter last 6 digits of NIC:");
        if(nicDigits?.length === 6) localStorage.setItem('user_nic', nicDigits);
        else location.reload();

        const peer = new Peer("NIC-" + nicDigits);
        let localStream, currentCall, incomingCallData;
        let isVideoMode = true;

        // Initialize Local Media
        navigator.mediaDevices.getUserMedia({ video: true, audio: true }).then(s => {
            localStream = s;
            document.getElementById('localVideo').srcObject = s;
        }).catch(e => alert("Please allow Camera/Mic access."));

        peer.on('open', id => document.getElementById('my-id').innerText = id);

        // Handling Call Events
        peer.on('call', call => {
            incomingCallData = call;
            const isAudio = call.options?.metadata?.mode === 'audio';
            document.getElementById('incomingType').innerText = isAudio ? "Incoming Audio Call..." : "Incoming Video Call...";
            document.getElementById('incomingCallUI').style.display = 'flex';
            document.getElementById('ringtone').play();
        });

        function makeCall(mode) {
            const peerId = document.getElementById('peer-id').value;
            if(peerId.length !== 6) return alert("Enter 6 digits");
            
            const options = { metadata: { mode: mode } };
            const call = peer.call("NIC-" + peerId, localStream, options);
            
            if(mode === 'audio') switchAudioMode(true);
            setupCall(call);
        }

        function acceptCall() {
            document.getElementById('ringtone').pause();
            document.getElementById('incomingCallUI').style.display = 'none';
            
            const isAudio = incomingCallData.options?.metadata?.mode === 'audio';
            if(isAudio) switchAudioMode(true);
            
            incomingCallData.answer(localStream);
            setupCall(incomingCallData);
        }

        function setupCall(call) {
            currentCall = call;
            document.getElementById('startUI').classList.add('hidden');
            document.getElementById('activeControls').classList.remove('hidden');
            
            call.on('stream', s => {
                document.getElementById('remoteVideo').srcObject = s;
            });
            call.on('close', () => location.reload());
        }

        function switchAudioMode(enabled) {
            document.getElementById('audioModeUI').style.display = enabled ? 'flex' : 'none';
            document.getElementById('selfBox').style.display = enabled ? 'none' : 'block';
            if(enabled) {
                localStream.getVideoTracks().forEach(t => t.enabled = false);
            }
        }

        function toggleAudio() {
            const t = localStream.getAudioTracks()[0];
            t.enabled = !t.enabled;
            document.getElementById('audioBtn').classList.toggle('bg-white', !t.enabled);
            document.getElementById('audioBtn').classList.toggle('text-black', !t.enabled);
        }

        function toggleVideo() {
            const t = localStream.getVideoTracks()[0];
            t.enabled = !t.enabled;
            document.getElementById('videoBtn').classList.toggle('bg-white', !t.enabled);
            document.getElementById('videoBtn').classList.toggle('text-black', !t.enabled);
            document.getElementById('selfBox').style.opacity = t.enabled ? "1" : "0.2";
        }

        function endCall() {
            if(currentCall) currentCall.close();
            location.reload();
        }

        function declineCall() {
            document.getElementById('ringtone').pause();
            location.reload();
        }

        function copyID() {
            navigator.clipboard.writeText(document.getElementById('my-id').innerText);
            alert("ID Copied to Clipboard!");
        }

        function switchTab(name) { alert(name + " feature is being encrypted..."); }
    </script>
</body>
</html>
