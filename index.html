<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NexCall </title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --wa-teal: #00a884; --wa-dark: #0b141a; --wa-bg: #111b21; }
        body { background-color: var(--wa-dark); color: white; font-family: 'Segoe UI', Roboto, sans-serif; height: 100dvh; overflow: hidden; display: flex; flex-direction: column; }
        
        /* Video Grid Management */
        #videoGrid { 
            flex: 1; display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); 
            gap: 8px; padding: 8px; background: #000; align-content: center; overflow-y: auto;
        }
        .video-box { position: relative; width: 100%; aspect-ratio: 3/4; border-radius: 12px; overflow: hidden; background: #202c33; border: 1px solid rgba(255,255,255,0.1); }
        video { width: 100%; height: 100%; object-fit: cover; }
        
        .self-view { 
            position: absolute; bottom: 90px; right: 15px; width: 90px; height: 130px; 
            border-radius: 12px; border: 2px solid var(--wa-teal); z-index: 100; overflow: hidden; box-shadow: 0 8px 20px rgba(0,0,0,0.5);
        }

        /* Nav & Controls */
        .nav-bar { height: 75px; background: var(--wa-bg); display: flex; justify-content: space-around; align-items: center; border-top: 1px solid rgba(255,255,255,0.05); }
        .nav-item { display: flex; flex-direction: column; align-items: center; color: #8696a0; width: 25%; cursor: pointer; }
        .nav-active { color: white; }
        .nav-active i { background: #005c4b; color: #dcf8c6; border-radius: 20px; padding: 4px 18px; }
        .nav-text { font-size: 11px; margin-top: 5px; font-weight: 600; }

        .btn-round { width: 55px; height: 55px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.3rem; transition: 0.3s; background: rgba(255,255,255,0.1); }
        .btn-danger { background: #ea0038 !important; }
        
        /* Overlays */
        #setupUI { position: fixed; inset: 0; background: #0b141a; z-index: 500; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; text-center; }
        #incomingCallUI { position: fixed; inset: 0; background: #0b141a; z-index: 1000; display: none; flex-direction: column; align-items: center; padding-top: 20%; }
        
        .mirror { transform: scaleX(-1); }
        .member-tag { background: rgba(0, 168, 132, 0.2); color: var(--wa-teal); padding: 4px 12px; border-radius: 20px; font-size: 12px; border: 1px solid var(--wa-teal); }
    </style>
</head>
<body>

    <div id="videoGrid">
        </div>

    <div class="self-view" id="myView">
        <video id="localVideo" class="mirror" autoplay muted playsinline></video>
    </div>

    <div id="activeControls" class="hidden fixed bottom-[85px] inset-x-0 flex justify-center gap-6 z-[110]">
        <button onclick="toggleAudio()" id="audioBtn" class="btn-round"><i class="fas fa-microphone"></i></button>
        <button onclick="location.reload()" class="btn-round btn-danger text-2xl shadow-xl"><i class="fas fa-phone-slash"></i></button>
        <button onclick="toggleVideo()" id="videoBtn" class="btn-round"><i class="fas fa-video"></i></button>
    </div>

    <div id="setupUI">
        <div class="mb-8">
            <div class="w-20 h-20 bg-teal-600/20 rounded-3xl flex items-center justify-center mx-auto mb-4">
                <i class="fas fa-users text-4xl text-teal-500"></i>
            </div>
            <h1 class="text-2xl font-bold">NexCall <span class="text-teal-500">Group</span></h1>
            <p class="text-slate-500 text-sm mt-1">Encrypted Multi-Peer Line</p>
        </div>

        <div class="w-full max-w-xs space-y-4">
            <div class="flex gap-2">
                <input type="number" id="peer-id-input" placeholder="Partner's 6 Digits" 
                       class="flex-1 bg-[#2a3942] rounded-xl p-4 outline-none border-2 border-transparent focus:border-teal-500 text-center font-bold">
                <button onclick="addMember()" class="bg-white text-black w-14 rounded-xl flex items-center justify-center">
                    <i class="fas fa-plus"></i>
                </button>
            </div>
            
            <div id="selectedList" class="flex flex-wrap gap-2 justify-center min-h-[30px]">
                </div>

            <div class="grid grid-cols-2 gap-3 pt-4">
                <button onclick="initiateCall('video')" class="bg-teal-600 py-4 rounded-2xl font-bold flex items-center justify-center gap-2">
                    <i class="fas fa-video"></i> Video
                </button>
                <button onclick="initiateCall('audio')" class="bg-slate-700 py-4 rounded-2xl font-bold flex items-center justify-center gap-2">
                    <i class="fas fa-phone"></i> Audio
                </button>
            </div>
        </div>

        <div class="mt-10 opacity-60" onclick="copyMyID()">
            <p class="text-[10px] uppercase tracking-widest mb-1">Your Identity</p>
            <p id="my-id-display" class="font-mono text-teal-400 font-bold">NIC-XXXXXX</p>
        </div>
    </div>

    <div id="incomingCallUI">
        <div class="w-24 h-24 bg-[#202c33] rounded-full flex items-center justify-center mb-6 border-2 border-teal-500">
            <i class="fas fa-user-group text-3xl text-slate-400"></i>
        </div>
        <h2 class="text-2xl font-bold mb-1">Incoming Group Call</h2>
        <p class="text-teal-500 animate-pulse text-sm mb-20 uppercase tracking-widest">Secure Multi-Line Ringing</p>
        
        <div class="flex gap-16">
            <button onclick="location.reload()" class="w-16 h-16 bg-red-500 rounded-full flex items-center justify-center text-xl shadow-lg"><i class="fas fa-times"></i></button>
            <button onclick="acceptIncoming()" class="w-16 h-16 bg-green-500 rounded-full flex items-center justify-center text-xl shadow-lg animate-bounce"><i class="fas fa-phone"></i></button>
        </div>
        <audio id="ringtone" loop src="https://www.soundjay.com/phone/phone-calling-1.mp3"></audio>
    </div>

    <nav class="nav-bar">
        <div class="nav-item" onclick="alert('Chats coming soon')"><i class="fas fa-comment-alt"></i><span class="nav-text">Chats</span></div>
        <div class="nav-item" onclick="alert('Updates coming soon')"><i class="fas fa-circle-notch"></i><span class="nav-text">Updates</span></div>
        <div class="nav-item nav-active"><i><i class="fas fa-phone"></i></i><span class="nav-text">Calls</span></div>
    </nav>

    <script>
        let nicDigits = localStorage.getItem('user_nic') || prompt("Register: Enter last 6 digits of your NIC:");
        if(nicDigits?.length === 6) localStorage.setItem('user_nic', nicDigits);
        else location.reload();

        const peer = new Peer("NIC-" + nicDigits);
        let localStream;
        let groupMembers = [];
        let activeConnections = {};

        // 1. Get Media
        navigator.mediaDevices.getUserMedia({ video: true, audio: true }).then(stream => {
            localStream = stream;
            document.getElementById('localVideo').srcObject = stream;
        });

        peer.on('open', id => document.getElementById('my-id-display').innerText = id);

        // 2. Handle Incoming Call
        let incomingCallObj;
        peer.on('call', call => {
            incomingCallObj = call;
            document.getElementById('incomingCallUI').style.display = 'flex';
            document.getElementById('ringtone').play();
        });

        function acceptIncoming() {
            document.getElementById('ringtone').pause();
            document.getElementById('incomingCallUI').style.display = 'none';
            document.getElementById('setupUI').classList.add('hidden');
            document.getElementById('activeControls').classList.remove('hidden');
            
            incomingCallObj.answer(localStream);
            handlePeerStream(incomingCallObj);
        }

        // 3. Group Logic
        function addMember() {
            const val = document.getElementById('peer-id-input').value;
            if(val.length === 6 && !groupMembers.includes("NIC-" + val)) {
                const fullId = "NIC-" + val;
                groupMembers.push(fullId);
                
                const tag = document.createElement('div');
                tag.className = 'member-tag';
                tag.innerText = val;
                document.getElementById('selectedList').appendChild(tag);
                document.getElementById('peer-id-input').value = "";
            }
        }

        function initiateCall(mode) {
            if(groupMembers.length === 0) return alert("Add at least one member ID");
            
            document.getElementById('setupUI').classList.add('hidden');
            document.getElementById('activeControls').classList.remove('hidden');

            if(mode === 'audio') {
                localStream.getVideoTracks().forEach(t => t.enabled = false);
                document.getElementById('videoBtn').classList.add('bg-white', 'text-black');
            }

            groupMembers.forEach(memberId => {
                const call = peer.call(memberId, localStream, { metadata: { mode: mode } });
                handlePeerStream(call);
            });
        }

        function handlePeerStream(call) {
            call.on('stream', remoteStream => {
                if(!activeConnections[call.peer]) {
                    createVideoElement(call.peer, remoteStream);
                    activeConnections[call.peer] = call;
                }
            });
            
            call.on('close', () => {
                const el = document.getElementById('box-' + call.peer);
                if(el) el.remove();
                delete activeConnections[call.peer];
            });
        }

        function createVideoElement(peerId, stream) {
            const container = document.getElementById('videoGrid');
            const box = document.createElement('div');
            box.id = 'box-' + peerId;
            box.className = 'video-box';
            
            const video = document.createElement('video');
            video.srcObject = stream;
            video.autoplay = true;
            video.playsInline = true;
            
            box.appendChild(video);
            container.appendChild(box);
        }

        // 4. Controls
        function toggleAudio() {
            const t = localStream.getAudioTracks()[0];
            t.enabled = !t.enabled;
            document.getElementById('audioBtn').classList.toggle('bg-white');
            document.getElementById('audioBtn').classList.toggle('text-black');
        }

        function toggleVideo() {
            const t = localStream.getVideoTracks()[0];
            t.enabled = !t.enabled;
            document.getElementById('videoBtn').classList.toggle('bg-white');
            document.getElementById('videoBtn').classList.toggle('text-black');
            document.getElementById('myView').style.opacity = t.enabled ? "1" : "0.3";
        }

        function copyMyID() {
            navigator.clipboard.writeText(document.getElementById('my-id-display').innerText);
            alert("Your ID Copied!");
        }
    </script>
</body>
</html>
