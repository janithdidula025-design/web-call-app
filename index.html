<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NexCall Pro</title>
    <link rel="manifest" href="manifest.json">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #0b0f19; overscroll-behavior: none; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .video-full { object-fit: cover; width: 100vw; height: 100vh; }
        .self-view { 
            position: absolute; top: 20px; right: 20px; 
            width: 100px; height: 150px; border-radius: 12px;
            border: 2px solid rgba(59, 130, 246, 0.5); overflow: hidden;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5); z-index: 10;
        }
        .controls-panel {
            position: fixed; bottom: 30px; left: 50%;
            transform: translateX(-50%); z-index: 20;
            width: 90%; max-width: 400px;
        }
        #installBtn { display: none; }
    </style>
</head>
<body class="text-white overflow-hidden font-sans">

    <button id="installBtn" class="fixed top-4 left-1/2 -translate-x-1/2 z-50 bg-blue-600 px-5 py-2 rounded-full text-sm font-bold shadow-2xl flex items-center gap-2 animate-bounce">
        <i class="fas fa-plus-circle"></i> Install App
    </button>

    <div class="relative w-screen h-screen">
        <video id="remoteVideo" class="video-full bg-slate-900" autoplay playsinline></video>
        
        <div class="self-view">
            <video id="localVideo" class="w-full h-full object-cover" autoplay muted playsinline></video>
        </div>

        <div id="waitingMsg" class="absolute inset-0 flex flex-col items-center justify-center bg-slate-900/80 z-0">
            <div class="w-16 h-16 border-4 border-blue-500 border-t-transparent rounded-full animate-spin mb-4"></div>
            <p class="text-slate-400">Ready for connection...</p>
        </div>
    </div>

    <div class="controls-panel flex flex-col gap-4">
        
        <div class="glass p-4 rounded-3xl shadow-2xl">
            <div class="flex items-center justify-between mb-3 px-1">
                <span class="text-[10px] uppercase tracking-tighter text-slate-400">Your Shareable ID</span>
                <button onclick="copyID()" class="text-blue-400 text-xs font-bold">COPY ID</button>
            </div>
            <div id="my-id" class="text-center font-mono text-lg py-1 bg-slate-800/50 rounded-xl text-emerald-400 border border-emerald-500/20">
                Generating...
            </div>
        </div>

        <div class="glass p-5 rounded-[2.5rem] flex flex-col gap-4 shadow-2xl">
            <div class="flex gap-2">
                <input type="text" id="peer-id" placeholder="Paste Partner ID" 
                       class="flex-1 bg-slate-800 border border-slate-700 px-4 py-3 rounded-2xl focus:outline-none focus:border-blue-500 text-sm">
                <button onclick="makeCall()" class="bg-emerald-600 hover:bg-emerald-500 px-6 rounded-2xl font-bold transition">
                    <i class="fas fa-phone-alt"></i>
                </button>
            </div>

            <div class="flex justify-center gap-6 py-1">
                <button id="audioBtn" onclick="toggleAudio()" class="w-12 h-12 rounded-full bg-slate-700/50 flex items-center justify-center text-xl transition">
                    <i class="fas fa-microphone"></i>
                </button>
                <button id="endCallBtn" onclick="location.reload()" class="w-14 h-14 rounded-full bg-red-600 flex items-center justify-center text-xl shadow-lg">
                    <i class="fas fa-phone-slash"></i>
                </button>
                <button id="videoBtn" onclick="toggleVideo()" class="w-12 h-12 rounded-full bg-slate-700/50 flex items-center justify-center text-xl transition">
                    <i class="fas fa-video"></i>
                </button>
            </div>
        </div>
    </div>

    <script>
        const peer = new Peer();
        let localStream;
        let deferredPrompt;

        // PWA Installation Logic
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            document.getElementById('installBtn').style.display = 'flex';
        });

        document.getElementById('installBtn').addEventListener('click', async () => {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                const { outcome } = await deferredPrompt.userChoice;
                if (outcome === 'accepted') document.getElementById('installBtn').style.display = 'none';
                deferredPrompt = null;
            }
        });

        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }

        // Camera Access
        navigator.mediaDevices.getUserMedia({ video: true, audio: true }).then(stream => {
            localStream = stream;
            document.getElementById('localVideo').srcObject = stream;
        }).catch(err => alert("Please enable camera/mic: " + err));

        // Peer Logic
        peer.on('open', id => document.getElementById('my-id').innerText = id);

        peer.on('call', call => {
            call.answer(localStream);
            handleStream(call);
        });

        function makeCall() {
            const id = document.getElementById('peer-id').value;
            if(!id) return alert("Enter an ID");
            const call = peer.call(id, localStream);
            handleStream(call);
        }

        function handleStream(call) {
            call.on('stream', st => {
                document.getElementById('remoteVideo').srcObject = st;
                document.getElementById('waitingMsg').style.display = 'none';
            });
        }

        // Toggles
        function toggleAudio() {
            const track = localStream.getAudioTracks()[0];
            track.enabled = !track.enabled;
            document.getElementById('audioBtn').classList.toggle('bg-red-500', !track.enabled);
            document.getElementById('audioBtn').innerHTML = track.enabled ? '<i class="fas fa-microphone"></i>' : '<i class="fas fa-microphone-slash"></i>';
        }

        function toggleVideo() {
            const track = localStream.getVideoTracks()[0];
            track.enabled = !track.enabled;
            document.getElementById('videoBtn').classList.toggle('bg-red-500', !track.enabled);
            document.getElementById('videoBtn').innerHTML = track.enabled ? '<i class="fas fa-video"></i>' : '<i class="fas fa-video-slash"></i>';
        }

        function copyID() {
            const id = document.getElementById('my-id').innerText;
            navigator.clipboard.writeText(id);
            alert("ID Copied to Clipboard!");
        }
        // NIC ඉලක්කම් ලබා ගැනීම
let nicDigits = prompt("Enter the last 6 digits of your National ID (NIC):");
while (nicDigits && (nicDigits.length !== 6 || isNaN(nicDigits))) {
    nicDigits = prompt("Invalid! Please enter exactly 6 digits:");
}

const customID = nicDigits ? "NIC-" + nicDigits : null;
const peer = new Peer(customID);

let localStream;
let deferredPrompt;

// PWA Install Logic
window.addEventListener('beforeinstallprompt', (e) => {
    e.preventDefault();
    deferredPrompt = e;
    const installBtn = document.getElementById('installBtn');
    if(installBtn) installBtn.style.display = 'flex';
});

const installBtn = document.getElementById('installBtn');
if(installBtn) {
    installBtn.addEventListener('click', async () => {
        if (deferredPrompt) {
            deferredPrompt.prompt();
            const { outcome } = await deferredPrompt.userChoice;
            if (outcome === 'accepted') installBtn.style.display = 'none';
            deferredPrompt = null;
        }
    });
}

// Service Worker
if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js');
}

// Camera Logic
navigator.mediaDevices.getUserMedia({ video: true, audio: true }).then(stream => {
    localStream = stream;
    document.getElementById('localVideo').srcObject = stream;
}).catch(err => alert("Camera access required."));

// Peer Logic
peer.on('open', id => {
    const myIdDisplay = document.getElementById('my-id');
    if(myIdDisplay) myIdDisplay.innerText = id;
});

peer.on('error', (err) => {
    if (err.type === 'id-taken') {
        alert("This ID is already in use.");
        location.reload();
    }
});

peer.on('call', call => {
    call.answer(localStream);
    handleStream(call);
});

function makeCall() {
    let remoteId = document.getElementById('peer-id').value;
    if(!remoteId) return alert("Enter Partner's ID");
    if(!remoteId.startsWith("NIC-")) remoteId = "NIC-" + remoteId;
    
    const call = peer.call(remoteId, localStream);
    handleStream(call);
}

function handleStream(call) {
    call.on('stream', st => {
        document.getElementById('remoteVideo').srcObject = st;
        const waiting = document.getElementById('waitingMsg');
        if(waiting) waiting.classList.add('hidden');
    });
}

// Controls
function toggleAudio() {
    const track = localStream.getAudioTracks()[0];
    track.enabled = !track.enabled;
    document.getElementById('audioBtn').classList.toggle('bg-red-500', !track.enabled);
}

function toggleVideo() {
    const track = localStream.getVideoTracks()[0];
    track.enabled = !track.enabled;
    document.getElementById('videoBtn').classList.toggle('bg-red-500', !track.enabled);
}

function copyID() {
    const id = document.getElementById('my-id').innerText;
    navigator.clipboard.writeText(id);
    alert("ID Copied!");
}
    </script>
</body>
</html>
