<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WhatsApp Pro | Secure Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --wa-green: #00a884;
            --wa-bg: #0b141a;
            --wa-panel: #202c33;
            --wa-bubble-me: #005c4b;
            --wa-bubble-them: #202c33;
        }
        body { background-color: var(--wa-bg); color: #e9edef; font-family: 'Segoe UI', sans-serif; }
        
        .chat-wallpaper {
            background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png');
            background-blend-mode: overlay;
            background-color: rgba(11, 20, 26, 0.95);
        }

        .bubble {
            position: relative;
            padding: 8px 12px;
            border-radius: 8px;
            max-width: 80%;
            font-size: 0.95rem;
            box-shadow: 0 1px 1px rgba(0,0,0,0.2);
        }
        .bubble-me { background: var(--wa-bubble-me); align-self: flex-end; border-top-right-radius: 0; }
        .bubble-them { background: var(--wa-bubble-them); align-self: flex-start; border-top-left-radius: 0; }
        
        .tab-active { border-bottom: 3px solid var(--wa-green); color: var(--wa-green); }
        
        /* Smooth Transitions */
        .screen-transition { transition: transform 0.3s ease-in-out; }
    </style>
</head>
<body class="h-screen flex flex-col overflow-hidden">

    <div id="authScreen" class="fixed inset-0 z-[5000] bg-[#0b141a] flex flex-col items-center justify-center p-10">
        <div class="text-center mb-10">
            <div class="w-20 h-20 bg-[#25d366] rounded-3xl flex items-center justify-center mx-auto mb-4 shadow-2xl rotate-12">
                <i class="fab fa-whatsapp text-5xl text-white -rotate-12"></i>
            </div>
            <h1 class="text-2xl font-bold">WhatsApp Pro</h1>
            <p class="text-[#8696a0]">Privacy Matters</p>
        </div>
        
        <div class="w-full max-w-sm space-y-4">
            <input type="text" id="userName" placeholder="Your Name" class="w-full bg-[#2a3942] p-4 rounded-xl outline-none border border-white/5">
            <div class="flex gap-2">
                <span class="bg-[#2a3942] p-4 rounded-xl text-[#8696a0]">+94</span>
                <input type="number" id="userPhone" placeholder="7x xxx xxxx" class="flex-1 bg-[#2a3942] p-4 rounded-xl outline-none">
            </div>
            <button onclick="registerUser()" class="w-full bg-[#00a884] text-[#0b141a] py-4 rounded-xl font-bold uppercase tracking-widest shadow-lg">Start Chatting</button>
        </div>
    </div>

    <div id="homeScreen" class="hidden h-full flex flex-col">
        <header class="bg-[#202c33] px-4 py-3 flex justify-between items-center shadow-md">
            <h1 class="text-xl font-bold text-[#8696a0]">WhatsApp</h1>
            <div class="flex gap-6 text-[#8696a0] text-lg">
                <i class="fas fa-search"></i>
                <i class="fas fa-ellipsis-v"></i>
            </div>
        </header>

        <div class="flex bg-[#202c33] text-sm font-bold text-[#8696a0] uppercase border-b border-white/5">
            <div class="flex-1 py-3 text-center tab-active">Chats</div>
            <div class="flex-1 py-3 text-center">Status</div>
            <div class="flex-1 py-3 text-center">Calls</div>
        </div>

        <div id="chatList" class="flex-1 overflow-y-auto">
            </div>

        <button class="fixed bottom-6 right-6 w-14 h-14 bg-[#00a884] rounded-full shadow-2xl flex items-center justify-center text-white text-xl">
            <i class="fas fa-comment-dots"></i>
        </button>
    </div>

    <div id="chatScreen" class="hidden fixed inset-0 z-[4000] bg-[#0b141a] flex flex-col">
        <header class="bg-[#202c33] p-2 flex items-center gap-2">
            <button onclick="backToHome()"><i class="fas fa-arrow-left px-2"></i></button>
            <div class="w-10 h-10 bg-gradient-to-tr from-gray-600 to-gray-400 rounded-full"></div>
            <div class="flex-1">
                <h2 id="targetName" class="text-sm font-bold truncate leading-tight">Receiver</h2>
                <p class="text-[10px] text-[#00a884]">online</p>
            </div>
            <div class="flex gap-5 px-3 text-[#aebac1]">
                <button onclick="launchVideoCall()"><i class="fas fa-video"></i></button>
                <i class="fas fa-phone"></i>
                <i class="fas fa-ellipsis-v"></i>
            </div>
        </header>

        <div id="messageBox" class="flex-1 chat-wallpaper overflow-y-auto p-4 flex flex-col gap-2">
            </div>

        <footer class="p-2 flex items-center gap-2 bg-[#202c33]">
            <div class="flex-1 bg-[#2a3942] rounded-full flex items-center px-4 py-2 gap-3">
                <i class="far fa-smile text-[#8696a0] text-xl"></i>
                <input type="text" id="mainInput" placeholder="Message" class="bg-transparent flex-1 outline-none text-sm">
                <i class="fas fa-paperclip text-[#8696a0]"></i>
            </div>
            <button onclick="handleSendMessage()" class="w-12 h-12 bg-[#00a884] rounded-full flex items-center justify-center text-white shadow-lg">
                <i class="fas fa-paper-plane"></i>
            </button>
        </footer>
    </div>

    <script>
        let userData = JSON.parse(localStorage.getItem('wa_pro_user'));
        let activeRecipient = null;

        // Init App
        if(userData) {
            document.getElementById('authScreen').classList.add('hidden');
            document.getElementById('homeScreen').classList.remove('hidden');
            loadChatList();
        }

        function registerUser() {
            const name = document.getElementById('userName').value;
            const phone = document.getElementById('userPhone').value;
            if(!name || phone.length < 9) return alert("Enter valid details");

            userData = { name, phone, id: 'WA-' + phone };
            localStorage.setItem('wa_pro_user', JSON.stringify(userData));
            location.reload();
        }

        function loadChatList() {
            const list = document.getElementById('chatList');
            // Sample Data - Firebase එකෙන් මේවා ගන්න පුළුවන්
            const contacts = [
                { name: "ADM Support", phone: "0112233445", msg: "Welcome to NexCall Hub!" },
                { name: "Development Team", phone: "0778899001", msg: "UI Update is live." }
            ];

            list.innerHTML = contacts.map(c => `
                <div onclick="openChat('${c.name}', '${c.phone}')" class="flex items-center gap-4 p-4 active:bg-[#202c33] transition">
                    <div class="w-14 h-14 bg-emerald-700 rounded-full flex items-center justify-center font-bold text-xl uppercase">${c.name[0]}</div>
                    <div class="flex-1 border-b border-white/5 pb-4">
                        <div class="flex justify-between mb-1">
                            <span class="font-bold">${c.name}</span>
                            <span class="text-xs text-[#8696a0]">Just now</span>
                        </div>
                        <p class="text-sm text-[#8696a0] truncate">${c.msg}</p>
                    </div>
                </div>
            `).join('');
        }

        function openChat(name, phone) {
            activeRecipient = phone;
            document.getElementById('chatScreen').classList.remove('hidden');
            document.getElementById('targetName').innerText = name;
            document.getElementById('messageBox').innerHTML = ''; // Clear old messages
        }

        function backToHome() {
            document.getElementById('chatScreen').classList.add('hidden');
        }

        function handleSendMessage() {
            const input = document.getElementById('mainInput');
            if(!input.value) return;

            const box = document.getElementById('messageBox');
            const time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            
            const msgDiv = document.createElement('div');
            msgDiv.className = 'bubble bubble-me animate-fade-in';
            msgDiv.innerHTML = `
                ${input.value}
                <span class="text-[10px] opacity-60 ml-2 mt-1 block text-right">
                    ${time} <i class="fas fa-check-double text-blue-400"></i>
                </span>
            `;
            
            box.appendChild(msgDiv);
            input.value = '';
            box.scrollTop = box.scrollHeight;
        }

        function launchVideoCall() {
            // මෙතනට ඔයාගේ NexCall Peer ID එක පාස් කරන්න පුළුවන්
            const callId = activeRecipient;
            alert(`Initiating Secure Video Call to Node: ${callId}\nPowered by NexCall Engine`);
            // location.href = `videocall.html?target=${callId}`; // වෙනම file එකකට යවන්න පුළුවන්
        }
    </script>
</body>
</html>
