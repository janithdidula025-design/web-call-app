<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ChatApp | Secure P2P Messenger</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

   
    
    <style>
        :root {
            --brand-green: #00a884;
            --main-bg: #0b141a;
            --panel-bg: #202c33;
            --bubble-me: #005c4b;
            --bubble-them: #202c33;
            --text-primary: #e9edef;
            --text-secondary: #8696a0;
        }

        body { 
            background-color: var(--main-bg); 
            color: var(--text-primary); 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            height: 100dvh; 
            overflow: hidden; 
        }
        
        .chat-wallpaper {
            background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png');
            background-blend-mode: overlay; 
            background-color: rgba(11, 20, 26, 0.96);
        }

        .bubble { 
            position: relative; 
            padding: 8px 12px; 
            border-radius: 10px; 
            max-width: 85%; 
            font-size: 0.95rem; 
            box-shadow: 0 1px 1px rgba(0,0,0,0.2); 
            line-height: 1.4;
            word-wrap: break-word;
        }

        .bubble-me { background: var(--bubble-me); align-self: flex-end; border-top-right-radius: 0; }
        .bubble-them { background: var(--bubble-them); align-self: flex-start; border-top-left-radius: 0; }
        
        .tab-active { border-bottom: 3px solid var(--brand-green); color: var(--brand-green); }

        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: #374151; border-radius: 10px; }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .msg-animate { animation: slideIn 0.15s ease-out forwards; }
    </style>
</head>
<body class="flex flex-col">
     <div id="installBanner" class="hidden p-4 bg-[#202c33] border-b border-[#00a884] flex justify-between items-center">
    <div class="text-sm">Install ChatApp for a better experience!</div>
    <button onclick="triggerInstall()" class="bg-[#00a884] text-black px-4 py-2 rounded-lg font-bold text-xs">INSTALL</button>
</div>

    <div id="authScreen" class="fixed inset-0 z-[5000] bg-[#0b141a] flex flex-col items-center justify-center p-10">
        <div class="text-center mb-10">
            <div class="w-20 h-20 bg-[#00a884] rounded-3xl flex items-center justify-center mx-auto mb-4 shadow-2xl rotate-3">
                <i class="fas fa-comment-alt text-4xl text-white"></i>
            </div>
            <h1 class="text-3xl font-extrabold tracking-tight">ChatApp</h1>
            <p class="text-xs text-[#8696a0] mt-2 font-mono uppercase tracking-widest">End-to-End P2P</p>
        </div>
        <div class="w-full max-w-sm space-y-4">
            <input type="text" id="userName" placeholder="Your Name" class="w-full bg-[#2a3942] p-4 rounded-xl outline-none border border-white/5 focus:ring-2 ring-[#00a884]">
            <input type="number" id="userPhone" placeholder="Mobile Number" class="w-full bg-[#2a3942] p-4 rounded-xl outline-none border border-white/5 focus:ring-2 ring-[#00a884]">
            <button onclick="registerUser()" class="w-full bg-[#00a884] text-[#0b141a] py-4 rounded-xl font-bold uppercase tracking-widest hover:opacity-90 active:scale-95 transition">Enter Chat</button>
        </div>
    </div>

    <div id="homeScreen" class="hidden h-full flex flex-col">
        <header class="bg-[#202c33] px-5 py-4 flex justify-between items-center shadow-lg">
            <h1 class="text-2xl font-bold text-[#e9edef]">ChatApp</h1>
            <div class="flex gap-6 text-[#8696a0] text-lg">
                <i class="fas fa-camera cursor-pointer"></i>
                <i class="fas fa-search cursor-pointer"></i>
                <i class="fas fa-ellipsis-v cursor-pointer"></i>
            </div>
        </header>

        <div class="flex bg-[#202c33] text-sm font-bold text-[#8696a0] uppercase tracking-wider border-b border-white/5">
            <div class="flex-1 py-3 text-center tab-active">Chats</div>
            <div class="flex-1 py-3 text-center">Status</div>
            <div class="flex-1 py-3 text-center">Calls</div>
        </div>

        <div class="p-4 bg-[#111b21] flex gap-2">
            <input type="number" id="targetPhone" placeholder="Friend's Mobile Number" class="flex-1 bg-[#2a3942] p-3 rounded-xl text-sm outline-none border border-white/5">
            <button onclick="startNewChat()" class="bg-[#00a884] px-5 rounded-xl text-black font-bold text-xs shadow-lg active:scale-95 transition">CHAT</button>
        </div>

        <div id="chatList" class="flex-1 overflow-y-auto bg-[#111b21]">
            </div>
    </div>

    <div id="chatScreen" class="hidden fixed inset-0 z-[4000] bg-[#0b141a] flex flex-col">
        <header class="bg-[#202c33] p-3 flex items-center gap-3 shadow-md">
            <button onclick="backToHome()" class="p-1"><i class="fas fa-arrow-left text-lg"></i></button>
            <div id="chatAvatar" class="w-10 h-10 bg-emerald-600 rounded-full flex items-center justify-center font-bold text-white">?</div>
            <div class="flex-1 overflow-hidden">
                <h2 id="targetDisplay" class="text-sm font-bold truncate">User</h2>
                <p id="connectionStatus" class="text-[10px] text-gray-400">connecting...</p>
            </div>
            <div class="flex gap-6 px-3 text-[#aebac1]">
                <i class="fas fa-video cursor-pointer"></i>
                <i class="fas fa-phone cursor-pointer"></i>
            </div>
        </header>

        <div id="messageBox" class="flex-1 chat-wallpaper overflow-y-auto p-4 flex flex-col gap-2">
            </div>

        <footer class="p-2 bg-[#202c33] flex items-center gap-2">
            <div class="flex-1 bg-[#2a3942] rounded-full flex items-center px-4 py-1 gap-3">
                <i class="far fa-smile text-[#8696a0] text-xl cursor-pointer"></i>
                <input type="text" id="msgInput" placeholder="Message" class="bg-transparent flex-1 py-2 outline-none text-sm text-white">
                <i class="fas fa-paperclip text-[#8696a0] -rotate-45 cursor-pointer"></i>
            </div>
            <button onclick="sendMessage()" class="w-11 h-11 bg-[#00a884] rounded-full flex items-center justify-center text-[#0b141a] shadow-lg active:scale-90 transition">
                <i class="fas fa-paper-plane"></i>
            </button>
        </footer>
    </div>

    <script>
        let peer, conn;
        let userData = JSON.parse(localStorage.getItem('chat_user'));
        let chatHistory = JSON.parse(localStorage.getItem('chat_history')) || {}; // { phone: [msgs] }
        let activePeers = JSON.parse(localStorage.getItem('chat_peers')) || []; // [{phone, name}]
        let currentChatPhone = null;

        // Auto-login
        if(userData) initPeer();

        function registerUser() {
            const name = document.getElementById('userName').value.trim();
            const phone = document.getElementById('userPhone').value.trim();
            if(!name || phone.length < 9) return alert("Valid name and phone required");
            
            userData = { name, phone };
            localStorage.setItem('chat_user', JSON.stringify(userData));
            initPeer();
        }

        function initPeer() {
            document.getElementById('authScreen').classList.add('hidden');
            document.getElementById('homeScreen').classList.remove('hidden');
            
            peer = new Peer("CHATA-" + userData.phone);

            peer.on('open', (id) => {
                console.log("Registered as: " + id);
                renderChatList();
            });

            // Listen for incoming connections
            peer.on('connection', (incomingConn) => {
                handleIncomingConnection(incomingConn);
            });
        }

        function handleIncomingConnection(incomingConn) {
            conn = incomingConn;
            const remotePhone = conn.peer.replace("CHATA-", "");
            
            setupConnListeners();
            addPeerToList(remotePhone, "User " + remotePhone);
        }

        function startNewChat() {
            const phone = document.getElementById('targetPhone').value.trim();
            if(!phone || phone === userData.phone) return alert("Enter a valid friend's number");
            openChatWindow(phone, "User " + phone);
        }

        function openChatWindow(phone, name) {
            currentChatPhone = phone;
            document.getElementById('chatScreen').classList.remove('hidden');
            document.getElementById('targetDisplay').innerText = name;
            document.getElementById('chatAvatar').innerText = name[0].toUpperCase();
            
            // Connect to peer
            conn = peer.connect("CHATA-" + phone);
            setupConnListeners();
            
            addPeerToList(phone, name);
            renderMessages();
        }

        function setupConnListeners() {
            conn.on('open', () => {
                if (currentChatPhone === conn.peer.replace("CHATA-", "")) {
                    document.getElementById('connectionStatus').innerText = "online";
                    document.getElementById('connectionStatus').className = "text-[10px] text-[#00a884] font-bold";
                }
            });

            conn.on('data', (data) => {
                const senderPhone = conn.peer.replace("CHATA-", "");
                saveMessage(senderPhone, data, 'them');
                
                if (currentChatPhone === senderPhone) {
                    renderMessages();
                } else {
                    renderChatList(); // Update preview in background
                }
            });

            conn.on('close', () => {
                document.getElementById('connectionStatus').innerText = "offline";
                document.getElementById('connectionStatus').className = "text-[10px] text-gray-400";
            });
        }

        function sendMessage() {
            const input = document.getElementById('msgInput');
            if(!input.value.trim() || !conn) return;

            const text = input.value;
            conn.send(text);
            saveMessage(currentChatPhone, text, 'me');
            renderMessages();
            renderChatList();
            input.value = '';
        }

        function saveMessage(phone, text, type) {
            if(!chatHistory[phone]) chatHistory[phone] = [];
            chatHistory[phone].push({
                text: text,
                type: type,
                time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
            });
            localStorage.setItem('chat_history', JSON.stringify(chatHistory));
        }

        function renderMessages() {
            const box = document.getElementById('messageBox');
            box.innerHTML = "";
            const msgs = chatHistory[currentChatPhone] || [];
            
            msgs.forEach(msg => {
                const div = document.createElement('div');
                div.className = `bubble bubble-${msg.type} msg-animate`;
                div.innerHTML = `
                    ${msg.text}
                    <span class="text-[9px] opacity-50 block text-right mt-1">${msg.time}</span>
                `;
                box.appendChild(div);
            });
            box.scrollTop = box.scrollHeight;
        }

        function addPeerToList(phone, name) {
            if(!activePeers.find(p => p.phone === phone)) {
                activePeers.unshift({phone, name});
                localStorage.setItem('chat_peers', JSON.stringify(activePeers));
            }
            renderChatList();
        }

        function renderChatList() {
            const list = document.getElementById('chatList');
            if(activePeers.length === 0) {
                list.innerHTML = `<div class="p-10 text-center text-gray-500 text-sm">No recent chats</div>`;
                return;
            }

            list.innerHTML = activePeers.map(p => {
                const history = chatHistory[p.phone] || [];
                const lastMsg = history.length > 0 ? history[history.length - 1] : { text: "No messages yet", time: "" };
                
                return `
                    <div onclick="openChatWindow('${p.phone}', '${p.name}')" class="flex items-center gap-4 p-4 border-b border-white/5 active:bg-[#202c33] transition cursor-pointer">
                        <div class="w-14 h-14 bg-emerald-800 rounded-full flex items-center justify-center font-bold text-lg text-white shadow-lg">${p.name[0].toUpperCase()}</div>
                        <div class="flex-1 overflow-hidden">
                            <div class="flex justify-between items-center mb-1">
                                <span class="font-bold text-[#e9edef]">${p.name}</span>
                                <span class="text-[10px] text-gray-500">${lastMsg.time}</span>
                            </div>
                            <p class="text-xs text-gray-400 truncate">${lastMsg.text}</p>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function backToHome() {
            currentChatPhone = null;
            document.getElementById('chatScreen').classList.add('hidden');
            renderChatList();
        }

        // Enter key to send
        document.getElementById('msgInput').addEventListener('keypress', (e) => {
            if(e.key === 'Enter') sendMessage();
        });
        let deferredPrompt;
const installBanner = document.getElementById('installBanner');

// 1. Install කරන්න පුළුවන් අවස්ථාවකදී බටන් එක පෙන්වීම
window.addEventListener('beforeinstallprompt', (e) => {
    e.preventDefault();
    deferredPrompt = e;
    // ඇප් එක දැනටමත් ඉන්ස්ටෝල් කරලා නැත්නම් විතරක් පෙන්වන්න
    installBanner.classList.remove('hidden');
});

// 2. Install Button එක click කළ විට සිදුවන දේ
window.triggerInstall = async () => {
    if (!deferredPrompt) return;
    
    deferredPrompt.prompt();
    const { outcome } = await deferredPrompt.userChoice;
    
    if (outcome === 'accepted') {
        console.log('User accepted the install prompt');
    }
    deferredPrompt = null;
    installBanner.classList.add('hidden'); // බටන් එක අයින් කරනවා
};

// 3. ඇප් එක ඉන්ස්ටෝල් වී අවසන් නම් බටන් එක සදහටම අයින් කරන්න
window.addEventListener('appinstalled', () => {
    installBanner.classList.add('hidden');
    deferredPrompt = null;
    console.log('PWA was installed');
});

// 4. Service Worker Register කිරීම (PWA එකක් වීමට අනිවාර්යයි)
if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js').then(reg => {
            console.log('Service Worker registered!');
        }).catch(err => console.log('SW registration failed:', err));
    });
}
    </script>
</body>
</html>
