<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NexCall Pro | Secure Line</title>
    <link rel="manifest" href="manifest.json">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --wa-teal: #00a884; --wa-dark: #0b141a; }
        body { background-color: var(--wa-dark); overscroll-behavior: none; font-family: 'Segoe UI', sans-serif; }
        .video-wrapper { height: 100dvh; width: 100vw; position: relative; overflow: hidden; background: #000; }
        .remote-video { width: 100%; height: 100%; object-fit: cover; }
        .self-view { 
            position: absolute; top: 1rem; right: 1rem; 
            width: 100px; height: 150px; border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.2); z-index: 50;
        }
        .bottom-sheet {
            position: fixed; bottom: 0; left: 0; right: 0;
            background: linear-gradient(to top, rgba(11,20,26,1) 40%, transparent);
            padding: 2rem 1rem; z-index: 100;
            display: flex; flex-direction: column; align-items: center; gap: 1.5rem;
            transition: transform 0.4s ease;
        }
        .control-group { display: flex; gap: 1.5rem; }
        .btn-circle {
            width: 55px; height: 55px; border-radius: 50%;
            display: flex; items-center justify-center; font-size: 1.2rem;
            background: rgba(255, 255, 255, 0.1); color: white; transition: 0.2s;
        }
        .btn-danger { background: #ff3b30 !important; }
        .btn-off { background: white !important; color: black !important; }
        .hidden-ui { transform: translateY(100%); opacity: 0; }
        .mirror { transform: scaleX(-1); }
    </style>
</head>
<body class="text-white">

    <div class="video-wrapper" onclick="toggleUIVisibility()">
        <video id="remoteVideo" class="remote-video" autoplay playsinline></video>
        <div class="self-view">
            <video id="localVideo" class="w-full h-full object-cover mirror" autoplay muted playsinline></video>
        </div>

        <div id="statusOverlay" class="absolute inset-0 flex flex-col items-center justify-center bg-[#0b141a] z-40">
            <h2 class="text-xl font-medium mb-1">NexCall Pro</h2>
            <p id="statusText" class="text-teal-500 text-xs tracking-widest uppercase">Initializing Secure Line...</p>
        </div>
    </div>

    <div id="uiOverlay" class="bottom-sheet">
        <div class="flex flex-col items-center">
            <span class="text-[10px] text-slate-400 uppercase tracking-widest">My Identity</span>
            <div class="flex items-center gap-2">
                <span id="my-id" class="text-teal-400 font-bold">NIC-XXXXXX</span>
                <i class="far fa-copy text-xs cursor-pointer" onclick="copyID()"></i>
            </div>
        </div>

        <div class="flex gap-2 w-full max-w-xs" id="callBox">
            <input type="number" id="peer-id" placeholder="Partner's 6 Digits" class="flex-1 bg-[#2a3942] rounded-lg p-3 outline-none focus:ring-1 focus:ring-teal-500">
            <button onclick="makeCall()" class="bg-teal-600 px-5 rounded-lg"><i class="fas fa-video"></i></button>
        </div>

        <div class="control-group">
            <button id="videoBtn" onclick="toggleVideo()" class="btn-circle"><i class="fas fa-video"></i></button>
            <button onclick="endCall()" class="btn-circle btn-danger"><i class="fas fa-phone-slash"></i></button>
            <button id="audioBtn" onclick="toggleAudio()" class="btn-circle"><i class="fas fa-microphone"></i></button>
        </div>
    </div>

    <script>
        let nicDigits = localStorage.getItem('user_nic');
        if (!nicDigits) {
            nicDigits = prompt("System Registration: Enter last 6 digits of NIC:");
            if (nicDigits?.length === 6) localStorage.setItem('user_nic', nicDigits);
            else location.reload();
        }

        const peer = new Peer("NIC-" + nicDigits);
        let localStream;
        let currentCall;

        // Notification Permission
        if (Notification.permission !== 'granted') Notification.requestPermission();

        navigator.mediaDevices.getUserMedia({ video: true, audio: true }).then(stream => {
            localStream = stream;
            document.getElementById('localVideo').srcObject = stream;
            document.getElementById('statusText').innerText = "Online - Ready to Receive";
        });

        peer.on('open', id => document.getElementById('my-id').innerText = id);

        // Incoming Call Logic
        peer.on('call', call => {
            // Background notification
            if (document.hidden) {
                new Notification("Incoming NexCall", {
                    body: "Someone is calling your secure line...",
                    icon: "https://cdn-icons-png.flaticon.com/512/174/174879.png"
                });
            }
            
            if (confirm("Incoming Call! Answer?")) {
                call.answer(localStream);
                setupStream(call);
            }
        });

        function makeCall() {
            const id = "NIC-" + document.getElementById('peer-id').value;
            setupStream(peer.call(id, localStream));
        }

        function setupStream(call) {
            currentCall = call;
            call.on('stream', st => {
                document.getElementById('remoteVideo').srcObject = st;
                document.getElementById('statusOverlay').style.display = 'none';
                document.getElementById('callBox').classList.add('hidden');
            });
        }

        function toggleAudio() {
            const t = localStream.getAudioTracks()[0]; t.enabled = !t.enabled;
            document.getElementById('audioBtn').classList.toggle('btn-off', !t.enabled);
        }

        function toggleVideo() {
            const t = localStream.getVideoTracks()[0]; t.enabled = !t.enabled;
            document.getElementById('videoBtn').classList.toggle('btn-off', !t.enabled);
        }

        function endCall() {
            if(currentCall) currentCall.close();
            location.reload();
        }

        function toggleUIVisibility() {
            document.getElementById('uiOverlay').classList.toggle('hidden-ui');
        }

        function copyID() {
            navigator.clipboard.writeText(document.getElementById('my-id').innerText);
            alert("ID Copied");
        }

        // Service Worker for Background Tasks
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }
    </script>
</body>
</html>
